<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Die Eine Kette — Bildmarke">
  <defs>
    <linearGradient id="goldMark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3DC93"/>
      <stop offset="0.5" stop-color="#D4AF37"/>
